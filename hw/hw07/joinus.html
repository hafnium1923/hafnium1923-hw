<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>JoinUs</title>
    <link type="text/css" rel="stylesheet" href="./css/basestyle.css"></link>
    
    <style>
        table{
	width:500px;
}
table, td, th{
	border-collapse: collaspe;
	border:solid 1px black;
	}
th{
	background-color: #ECECEC;
	width:100px;
	}
th.title{
	
	text-align: center;
	font-weight: bold;
	font-size: 13px;
}
th.name{
	table-layout: auto;
	width: 130px;
	text-align: center;
	font-weight: bold;
	font-size: 15px;
}
td.contents{
font-size: 13px;
}
    </style>
</head>

<body>
    <div id="top">
    <h1><a href="./hw07.html">Movie reservation</a></h1>
    </div>
    <div class="info"><a href="./login.html">LogIn</a> | <a href="./joinus.html">JoinUs</a> | <a href="./mypage.html">Mypage</a></div>

    <div id="menu">
        <ul>
            <a href="./list.html"><li>list</li></a>
            <li>|</li>
            <a href="./q&a.html"<li>Q&A</li>></a>
        </ul>
    </div>
    <main>
    <h2>회원가입</h2>
    <center>
    <table>
        <tr>
            <th colspan="2" id = "title">회원가입</th>
        </tr>
        <tr>
            <th class = "name">아이디</th>
            <td class="contents">
            <input type = "text" size = "15" maxlength = "15">
            <input type="button" value="중복확인">
            </td>
        </tr>
        <tr>
            <th class = "name">비밀번호</th>
            <td id="contents">
            <input type="password" size="13">
            </td>
        </tr>
        <tr>
            <th class = "name">성별</th>
            <td id="contents">
            <input type="radio" name="gen" value="0">남자
            <input type="radio" name="gen" value="1" checked>여자
            </td>
        </tr>
        <tr>
            <th class = "name">국적</th>
            <td id="contents">
            <input type="text" size = "20" value="대한민국" readonly> 
            <input type="button" value="국적변경" disabled>
        </tr>
        <tr>
            <th class = "name">휴대폰</th>
            <td id="contents">
            <select name="phone">
                <option value=1 selected>010</option>
                <option value="2">011</option>
                <option value="3">017</option>
                <option value="4">070</option>
                <option value="5">080</option>
            </select>
            -
            <input type="text" size="4" maxlength="4">
            -
            <input type="text" size="4" maxlength="4">
            </td>
        </tr>
        <tr>
            <th id class = "name">이메일</th>
            <td id="contents">
            <input type="text" size="30">
            </td>
        </tr>
        <tr>
            <th class = "name">생년월일</th>
            <td id="contents">
            <input type="date" size="17">
            </td>
        </tr>
        <tr>
            <th class = "name">관심분야</th>
            <td id="contents">
            <input type="checkbox" name="hobby" value="0">판타지
            <input type="checkbox" name="hobby" value="1" checked>액션
            <input type="checkbox" name="hobby" value="2">스릴러
            <input type="checkbox" name="hobby" value="3">로맨스
            <input type="checkbox" name="hobby" value="4">키즈
            </td>
        </tr>
        <tr>
            <th class = "name">자기소개</th>
            <td id="contents">
            <textarea rows="5px" cols="50px">간단한 자기소개를 남겨주세요.</textarea>
        </tr>
        <tr>
            <th class = "name">사진</th>
            <td id="contents">
            <input type="file" value="파일선택">
        </tr>
        <tr>
            <th colspan="2" id="title">
            <input type="button" value="가입하기"  onclick="document.location='hw07.html'">
            <input type="reset" value="다시작성">
            </th>
            
        </tr>
    </table>
</center>
</main>
</body>

</html>
