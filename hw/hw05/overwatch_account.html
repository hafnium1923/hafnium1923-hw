<!DOCTYPE html>
<html>
  <head>
<meta charset="utf-8">
<style>
  body{
    color: black;
    font-weight:bold;
    text-align: center;
    font-size:20px;
    background-color: #d5e0f8;
  }
  li[text ="title"]{
    font-weight: bolder;
    font-size: 24px;
  }
  li[text = "disc"]{
    font-weight: normal;
    font-size: 18px;
    list-style-type: disc;
  }
  li[text = "circle"]{
    font-weight: normal;
    font-size: 18px;
    list-style-type: circle;
  }
  li[text = "square"]{
    font-weight: normal;
    font-size: 18px;
    list-style-type: square;
  }
  </style>
  </head>
  <body>
    <section>

        <ol>
            <li text="title">본계정</li>
            <ul>
                <li text="disc">닉네임: MAL</li>
                <li text="circle">레벨: 151</li>
                <li text="square">경쟁전티어: 다이아</li>
                <li text="square">자유경쟁전티어: 골드</li>
            </ul>
            <br>
            <li text="title">부계정</li>
            <ul>
              <li text="disc">닉네임: 크롱</li>
              <li text="circle">레벨: 100</li>
              <li text="square">경쟁전티어: 골드</li>
              <li text="square">자유경쟁전티어: 골드</li>
          </ul>
        </ol>
    </section>
  </body>
</html>
