<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body{
      color: black;
      font-weight:bold;
      text-align: center;
      font-size:20px;
      background-color: #d5e0f8;
    }
    li[text ="title"]{
      font-weight: bolder;
      font-size: 24px;
    }
    li[text = "disc"]{
      font-weight: normal;
      font-size: 18px;
      list-style-type: disc;
    }
    li[text = "circle"]{
      font-weight: normal;
      font-size: 18px;
      list-style-type: circle;
    }
    li[text = "square"]{
      font-weight: normal;
      font-size: 18px;
      list-style-type: square;
    }
    </style>
  </head>
  <body>
        <ol>
            <li text="title">본계정</li>
            <ul>
                <li text="disc">닉네임: 흥행헝홍</li>
                <li text="circle">레벨: 130</li>
                <li text="square">자랭티어: 브론즈2</li>
                <li text="square">솔랭티어: 브론즈1</li>
            </ul>
            <br>
            <li text="title">부계정</li>
            <ul>
              <li text="disc">닉네임: 여친몰래겜하는중</li>
              <li text="circle">레벨: 35</li>
              <li text="square">자랭티어: 실버4</li>
              <li text="square">솔랭티어: 브론즈3</li>
          </ul>
        </ol>
  </body>
</html>
